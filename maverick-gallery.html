    <title>Maverick — Gallery</title>
    <style>
        :root {
            --mav-shell: 1200px;
            --turquoise: #00d2d3;
            --titanium: #a1a1a6;
            --border: rgba(255, 255, 255, 0.08);
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: var(--font-main);
            background: #050608;
            color: #fff;
            padding: 40px 24px 80px;
        }
        .site-nav {
            max-width: var(--mav-shell);
            margin: 0 auto 20px;
            font-size: 14px;
        }
        .site-nav a {
            color: var(--titanium);
            text-decoration: none;
            border-bottom: 1px solid rgba(161, 161, 166, 0.35);
        }
        .site-nav a:hover {
            color: #fff;
            border-bottom-color: rgba(255, 255, 255, 0.35);
        }
        .mav-subnav {
            max-width: var(--mav-shell);
            margin: 0 auto 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            background: rgba(20, 24, 28, 0.85);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .mav-subnav a {
            color: var(--titanium);
            text-decoration: none;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 10px 18px;
            border-radius: 8px;
        }
        .mav-subnav a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        .mav-subnav a.is-active {
            color: #000;
            background: var(--turquoise);
        }
        .wrap {
            max-width: var(--mav-shell);
            margin: 0 auto;
        }
        .panel {
            text-align: center;
            padding: 28px 24px 36px;
            background: #0c0e12;
            border: 1px solid #1a1f26;
            border-radius: 16px;
            margin-bottom: 32px;
        }
        .panel h1 {
            font-weight: 900;
            font-size: clamp(22px, 4vw, 30px);
            letter-spacing: -0.5px;
            margin: 0 0 10px;
            color: var(--turquoise);
            text-transform: uppercase;
        }
        .panel p {
            margin: 0 auto;
            max-width: 640px;
            color: #888;
            font-size: 15px;
            line-height: 1.55;
        }
        .mav-gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
            gap: 16px;
        }
        .mav-gallery-item {
            margin: 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0, 210, 211, 0.2);
            background: rgba(17, 20, 24, 0.9);
        }
        .mav-gallery-item a {
            display: block;
            color: inherit;
        }
        .mav-gallery-item a:focus-visible {
            outline: 2px solid var(--turquoise);
            outline-offset: 2px;
        }
        .mav-gallery-item img {
            display: block;
            width: 100%;
            height: auto;
        }
        .mav-gallery-item figcaption {
            padding: 10px 12px;
            font-size: 13px;
            color: var(--titanium);
        }
    </style>
</head>
