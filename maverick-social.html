<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Maverick Painting — Social Studio</title>
    <link rel="stylesheet" href="assets/maverick-mobile.css">
    <style>
        :root {
            --mav-shell: 1200px;
            --charcoal: #111418;
            --turquoise: #00d2d3;
            --lime: #32cd32;
            --bright-green: #00e676;
            --white: #ffffff;
            --titanium: #a1a1a6;
            --glass-bg: rgba(17, 20, 24, 0.75);
            --glass-border: rgba(0, 210, 211, 0.35);
            --text-light: #eef1f6;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* Hard stack for type on photos (no solid panel behind) */
            --harsh-shadow:
                0 0 2px rgba(0, 0, 0, 1),
                0 1px 0 rgba(0, 0, 0, 0.98),
                1px 2px 0 rgba(0, 0, 0, 0.94),
                2px 4px 0 rgba(0, 0, 0, 0.88),
                0 4px 18px rgba(0, 0, 0, 0.95),
                0 10px 32px rgba(0, 0, 0, 0.78);
            --harsh-shadow-accent:
                0 0 2px rgba(0, 0, 0, 1),
                0 1px 0 rgba(0, 0, 0, 0.98),
                1px 2px 0 rgba(0, 0, 0, 0.94),
                0 3px 14px rgba(0, 0, 0, 0.92),
                0 8px 24px rgba(0, 0, 0, 0.82);
        }

        body {
            font-family: var(--font-main);
            background-color: #0d1014;
            color: var(--white);
            margin: 0;
            padding: 40px 24px;
        }

        .site-nav {
            max-width: var(--mav-shell);
            margin: 0 auto 20px;
            font-size: 14px;
        }
        .site-nav a {
            color: var(--titanium);
            text-decoration: none;
            border-bottom: 1px solid rgba(161, 161, 166, 0.35);
        }
        .site-nav a:hover {
            color: var(--white);
            border-bottom-color: rgba(255, 255, 255, 0.35);
        }

        .mav-subnav {
            max-width: var(--mav-shell);
            margin: 0 auto 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            justify-content: center;
            padding: 12px 18px;
            background: rgba(22, 26, 32, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }
        .mav-subnav a {
            color: rgba(228, 228, 232, 0.9);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 8px;
        }
        .mav-subnav a:hover {
            color: var(--white);
            background: rgba(255, 255, 255, 0.08);
        }
        .mav-subnav a.is-active {
            color: #000;
            background: var(--turquoise);
        }

        .control-panel {
            text-align: center;
            margin-bottom: 40px;
            margin-left: auto;
            margin-right: auto;
            max-width: var(--mav-shell);
            width: 100%;
            padding: 30px;
            background: linear-gradient(180deg, rgba(30, 34, 40, 0.95) 0%, rgba(20, 24, 28, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        h1 {
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }
        h1 span { color: var(--turquoise); }
        .subtitle {
            color: rgba(210, 212, 218, 0.95);
            font-size: 16px;
            margin-bottom: 0;
            font-weight: 400;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.65;
        }

        .studio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 420px), 1fr));
            gap: 40px 28px;
            width: 100%;
            max-width: var(--mav-shell);
            margin: 0 auto;
            align-items: start;
            justify-items: center;
        }

        .template-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 420px;
            gap: 10px;
        }
        .template-name {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: rgba(200, 202, 208, 0.95);
            margin: 0;
            text-align: center;
            line-height: 1.4;
            padding: 0 8px;
        }
        .format-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            background: rgba(34, 38, 44, 0.95);
            color: #e8e8ec;
            font-size: 11px;
            font-weight: 600;
            margin-left: 6px;
        }

        .msoc-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin: 0;
        }
        .toolbar-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            letter-spacing: 0.02em;
            font-family: inherit;
        }
        .toolbar-btn:disabled { opacity: 0.55; cursor: wait; }
        label.toolbar-btn {
            background-color: var(--turquoise);
            color: #000;
        }
        label.toolbar-btn:hover { background-color: var(--bright-green); }
        .toolbar-btn--secondary {
            background: transparent;
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .toolbar-btn--secondary:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.06);
        }

        .msoc-stage {
            position: relative;
            background-color: var(--charcoal);
            border: 1px solid #1f252b;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
            flex-shrink: 0;
            background-repeat: no-repeat;
        }
        .msoc-stage.has-image {
            background-size: cover;
            background-position: center center;
        }
        .msoc-stage.msoc-canvas--square {
            width: 400px;
            height: 400px;
            border-radius: 0;
        }

        .msoc-grid-faux {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(0, 210, 211, 0.035) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 210, 211, 0.035) 1px, transparent 1px);
            background-size: 25px 25px;
        }
        .msoc-stage.has-image .msoc-grid-faux { display: none; }

        .msoc-inset-shade {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.9);
        }
        .msoc-stage.has-image .msoc-inset-shade { display: block; }

        .msoc-gradient-shade {
            display: none;
            position: absolute;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(17, 20, 24, 0.3) 0%, rgba(17, 20, 24, 0.8) 100%);
        }
        .msoc-stage.has-image .msoc-gradient-shade { display: block; }

        .msoc-scale-root {
            position: absolute;
            left: 0;
            top: 0;
            transform-origin: 0 0;
            z-index: 5;
            box-sizing: border-box;
            overflow: hidden;
        }
        .msoc-scale-root .pos-abs {
            box-sizing: border-box;
        }

        /* Two-column bars: left flexes, right fits contact (prevents clipping) */
        .msoc-2col-bar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) max-content;
            gap: 8px 12px;
            align-items: center;
            width: 100%;
        }
        .msoc-2col-bar--start { align-items: start; }
        .msoc-2col-bar--center { align-items: center; }
        .msoc-contact-col {
            text-align: right;
        }
        .msoc-contact-col .t-phone {
            white-space: nowrap;
        }
        /* Top split: brand block + contact / panels */
        .msoc-2col-top {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px 12px;
            align-items: start;
            width: 100%;
            box-sizing: border-box;
        }
        /* Legacy flex rows: allow shrink + wrap so text never clips */
        .msoc-scale-root .flex.justify-between {
            flex-wrap: wrap;
            gap: 8px 12px;
            align-items: flex-start;
        }
        .msoc-scale-root .flex.justify-between.align-center {
            align-items: center;
        }
        .msoc-scale-root .flex.justify-between > * {
            min-width: 0;
        }

        /* Overlay studio (square grid concepts) */
        .pos-abs { position: absolute; }
        .w-100 { width: 100%; }
        .h-100 { height: 100%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .align-center { align-items: center; }
        .gap-10 { gap: 10px; }
        .p-15 { padding: 15px; }

        .txt-shadow { text-shadow: var(--harsh-shadow); }

        /* All overlay copy: harsh shadow by default (readable on busy photos) */
        .msoc-scale-root :is(.h-mega, .t-brand, .t-tag, .t-body, .t-name, .t-phone) {
            text-shadow: var(--harsh-shadow);
        }
        .msoc-scale-root :is(.c-lime, .c-turq) {
            text-shadow: var(--harsh-shadow-accent);
        }

        /* Solid / frosted panels: drop shadow removed (panel carries contrast) */
        .msoc-scale-root .glass-panel :is(.h-mega, .t-brand, .t-tag, .t-body, .t-name, .t-phone),
        .msoc-scale-root .glass-panel :is(.c-lime, .c-turq),
        .msoc-scale-root .charcoal-panel :is(.h-mega, .t-brand, .t-tag, .t-body, .t-name, .t-phone),
        .msoc-scale-root .charcoal-panel :is(.c-lime, .c-turq) {
            text-shadow: none;
        }

        /* Vertical glass strip (same idea as glass-panel) */
        .msoc-scale-root .msoc-strip-glass :is(.h-mega, .t-brand, .t-tag, .t-body, .t-name, .t-phone),
        .msoc-scale-root .msoc-strip-glass :is(.c-lime, .c-turq) {
            text-shadow: none;
        }

        /* Lime solid bar: dark text — no halo */
        .msoc-scale-root .msoc-solid-lime :is(.h-mega, .t-brand, .t-tag, .t-body, .t-name, .t-phone),
        .msoc-scale-root .msoc-solid-lime :is(.c-lime, .c-turq) {
            text-shadow: none;
        }

        .h-mega {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.5px;
            color: #fff;
        }
        .t-body {
            font-size: 13px;
            font-weight: 400;
            line-height: 1.4;
            color: var(--text-light);
            margin-top: 4px;
        }
        .t-brand {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.12em;
            color: #fff;
        }
        .t-tag {
            font-size: 10px;
            font-weight: 650;
            letter-spacing: 0.5px;
            color: var(--text-light);
        }
        .t-name {
            font-size: 10px;
            font-weight: 700;
            color: #fff;
        }
        .t-phone {
            font-size: 12px;
            font-weight: 800;
            color: var(--turquoise);
        }

        .glass-panel {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 10px 15px;
        }
        .charcoal-panel { background: var(--charcoal); padding: 10px 15px; }
        .gradient-bottom {
            background: linear-gradient(to top, rgba(17, 20, 24, 0.95) 0%, rgba(17, 20, 24, 0) 100%);
            padding: 30px 15px 15px;
        }
        .gradient-top {
            background: linear-gradient(to bottom, rgba(17, 20, 24, 0.95) 0%, rgba(17, 20, 24, 0) 100%);
            padding: 15px 15px 30px;
        }

        .accent-left-lime { border-left: 4px solid var(--lime); }
        .accent-left-turq { border-left: 4px solid var(--turquoise); }
        .accent-top-lime { border-top: 4px solid var(--lime); }
        .accent-top-turq { border-top: 4px solid var(--turquoise); }
        .accent-right-turq { border-right: 4px solid var(--turquoise); }

        .c-lime { color: var(--lime); }
        .c-turq { color: var(--turquoise); }

        .msoc-stage.exporting .glass-panel {
            background: rgba(22, 26, 32, 0.94) !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
    </style>
</head>
<body>
    <nav class="site-nav"><a href="index.html">Hub</a></nav>

    <nav class="mav-subnav" aria-label="Maverick studios">
        <a href="maverick-studio.html">Business cards</a>
        <a href="maverick-social.html" class="is-active" aria-current="page">Social templates</a>
        <a href="maverick-brand.html">Brand guide</a>
        <a href="maverick-flyer.html">Flyers &amp; brochures</a>
        <a href="maverick-corporate.html">Corporate</a>
    </nav>

    <div class="control-panel">
        <h1><span>Maverick</span> Social Studio</h1>
        <p class="subtitle">Twenty-five <strong>1:1</strong> overlay layouts (400×400 logic, <strong>1080×1080</strong> PNG export). Upload a photo per card, then download the composite.</p>
    </div>

    <div class="studio-grid" id="msoc-square-grid" aria-label="Square templates"></div>

    <script src="msoc-square-templates.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" crossorigin="anonymous"></script>
    <script src="assets/maverick-blob-download.js"></script>
    <script>
        (function () {
            function msocNum(el, name, fallback) {
                var v = parseInt(el && el.getAttribute(name), 10);
                return isNaN(v) ? fallback : v;
            }

            function msocDrawCover(ctx, img, cw, ch) {
                var iw = img.naturalWidth || img.width;
                var ih = img.naturalHeight || img.height;
                if (!iw || !ih) return;
                var scale = Math.max(cw / iw, ch / ih);
                var dw = iw * scale;
                var dh = ih * scale;
                var dx = (cw - dw) / 2;
                var dy = (ch - dh) / 2;
                ctx.drawImage(img, dx, dy, dw, dh);
            }

            function msocDrawPhotoTreatment(ctx, cw, ch) {
                ctx.save();
                ctx.fillStyle = 'rgba(0,0,0,0.25)';
                ctx.fillRect(0, 0, cw, ch);
                var g = ctx.createRadialGradient(
                    cw / 2, ch / 2, Math.min(cw, ch) * 0.12,
                    cw / 2, ch / 2, Math.max(cw, ch) * 0.7
                );
                g.addColorStop(0, 'rgba(0,0,0,0)');
                g.addColorStop(1, 'rgba(0,0,0,0.55)');
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, cw, ch);
                var v = ctx.createLinearGradient(0, 0, 0, ch);
                v.addColorStop(0, 'rgba(17,20,24,0.15)');
                v.addColorStop(1, 'rgba(17,20,24,0.75)');
                ctx.fillStyle = v;
                ctx.fillRect(0, 0, cw, ch);
                ctx.restore();
            }

            function msocLoadImage(src) {
                return new Promise(function (resolve, reject) {
                    var im = new Image();
                    im.onload = function () { resolve(im); };
                    im.onerror = function () { reject(new Error('Could not load image for export')); };
                    im.src = src;
                });
            }

            function msocRenderOverlayOnly(stage) {
                return new Promise(function (resolve, reject) {
                    var logicW = msocNum(stage, 'data-logic-w', 400);
                    var logicH = msocNum(stage, 'data-logic-h', 400);
                    var exportW = msocNum(stage, 'data-export-w', 1080);
                    var exportH = msocNum(stage, 'data-export-h', 1080);
                    var sx = exportW / logicW;
                    var sy = exportH / logicH;
                    if (Math.abs(sx - sy) > 0.001) {
                        reject(new Error('Export aspect mismatch'));
                        return;
                    }
                    var scaleRoot = stage.querySelector('.msoc-scale-root');
                    if (!scaleRoot) {
                        reject(new Error('Missing scale root'));
                        return;
                    }
                    var exportToken = 'msoc-e-' + Date.now() + '-' + Math.random().toString(36).slice(2, 10);
                    var host = document.createElement('div');
                    host.className = 'msoc-stage exporting msoc-export-host';
                    host.setAttribute('data-msoc-export', exportToken);
                    host.style.cssText = [
                        'position:fixed',
                        'left:-10000px',
                        'top:0',
                        'width:' + exportW + 'px',
                        'height:' + exportH + 'px',
                        'box-sizing:border-box',
                        'background:transparent',
                        'border:none',
                        'box-shadow:none',
                        'overflow:hidden',
                        'margin:0',
                        'padding:0',
                        'border-radius:0'
                    ].join(';');
                    host.appendChild(scaleRoot.cloneNode(true));
                    document.body.appendChild(host);

                    html2canvas(host, {
                        scale: 1,
                        width: exportW,
                        height: exportH,
                        backgroundColor: null,
                        useCORS: true,
                        logging: false,
                        onclone: function (doc) {
                            var h2 = doc.querySelector('[data-msoc-export="' + exportToken + '"]');
                            if (h2) {
                                var sr = h2.querySelector('.msoc-scale-root');
                                if (sr) {
                                    sr.style.transform = 'scale(' + sx + ')';
                                    sr.style.transformOrigin = '0 0';
                                }
                            }
                        }
                    })
                        .then(function (canvas) {
                            if (host.parentNode) host.parentNode.removeChild(host);
                            resolve(canvas);
                        })
                        .catch(function (err) {
                            if (host.parentNode) host.parentNode.removeChild(host);
                            reject(err);
                        });
                });
            }

            function msocCompositeExport(stage) {
                return new Promise(function (resolve, reject) {
                    var exportW = msocNum(stage, 'data-export-w', 1080);
                    var exportH = msocNum(stage, 'data-export-h', 1080);
                    var out = document.createElement('canvas');
                    out.width = exportW;
                    out.height = exportH;
                    var ctx = out.getContext('2d');
                    if (!ctx) {
                        reject(new Error('Canvas unsupported'));
                        return;
                    }

                    ctx.fillStyle = '#111418';
                    ctx.fillRect(0, 0, exportW, exportH);

                    var bgUrl = stage.dataset.objectUrl;
                    var hasPhoto = !!(bgUrl && stage.classList.contains('has-image'));

                    function afterBase() {
                        return msocRenderOverlayOnly(stage).then(function (overlayCv) {
                            ctx.drawImage(overlayCv, 0, 0);
                            return out;
                        });
                    }

                    if (!hasPhoto) {
                        afterBase().then(resolve).catch(reject);
                        return;
                    }

                    msocLoadImage(bgUrl)
                        .then(function (img) {
                            msocDrawCover(ctx, img, exportW, exportH);
                            msocDrawPhotoTreatment(ctx, exportW, exportH);
                            return afterBase();
                        })
                        .then(resolve)
                        .catch(reject);
                });
            }

            function msocBuildSquareGrid() {
                var grid = document.getElementById('msoc-square-grid');
                var list = typeof MSOC_SQUARE_TEMPLATES !== 'undefined' ? MSOC_SQUARE_TEMPLATES : null;
                if (!grid) return;
                if (!list || !list.length) {
                    grid.innerHTML = '<p class="subtitle" style="color:#f88;">Template data failed to load (msoc-square-templates.js).</p>';
                    return;
                }
                list.forEach(function (t) {
                    var wrap = document.createElement('div');
                    wrap.className = 'template-wrapper';
                    wrap.innerHTML =
                        '<div class="template-name">' +
                        t.name.replace(/</g, '&lt;') +
                        ' <span class="format-badge">1:1</span></div>' +
                        '<div class="msoc-toolbar">' +
                        '<label class="toolbar-btn">Upload<input type="file" class="js-msoc-upload" accept="image/*" hidden></label>' +
                        '<button type="button" class="toolbar-btn toolbar-btn--secondary js-msoc-download">Download PNG</button>' +
                        '</div>' +
                        '<div class="msoc-stage msoc-canvas--square js-msoc-stage" data-card-id="' +
                        String(t.id).replace(/"/g, '') +
                        '" data-logic-w="400" data-logic-h="400" data-export-w="1080" data-export-h="1080">' +
                        '<div class="msoc-grid-faux" aria-hidden="true"></div>' +
                        '<div class="msoc-inset-shade" aria-hidden="true"></div>' +
                        '<div class="msoc-gradient-shade" aria-hidden="true"></div>' +
                        '<div class="msoc-scale-root" style="width:400px;height:400px;">' +
                        t.html +
                        '</div></div>';
                    grid.appendChild(wrap);
                });
            }

            msocBuildSquareGrid();

            document.querySelectorAll('.template-wrapper').forEach(function (wrap) {
                var fileInput = wrap.querySelector('.js-msoc-upload');
                var dlBtn = wrap.querySelector('.js-msoc-download');
                var stage = wrap.querySelector('.js-msoc-stage');
                if (!fileInput || !dlBtn || !stage) return;

                var cardId = stage.getAttribute('data-card-id') || 'msoc';
                var ew = msocNum(stage, 'data-export-w', 1080);
                var eh = msocNum(stage, 'data-export-h', 1080);

                fileInput.addEventListener('change', function () {
                    var file = fileInput.files && fileInput.files[0];
                    if (!file) return;
                    var prev = stage.dataset.objectUrl;
                    if (prev) URL.revokeObjectURL(prev);
                    var url = URL.createObjectURL(file);
                    stage.dataset.objectUrl = url;
                    stage.style.backgroundImage = 'url(' + JSON.stringify(url) + ')';
                    stage.style.backgroundSize = 'cover';
                    stage.style.backgroundPosition = 'center';
                    stage.classList.add('has-image');
                    fileInput.value = '';
                });

                dlBtn.addEventListener('click', function () {
                    if (typeof html2canvas !== 'function') {
                        alert('html2canvas did not load. Check your network and refresh the page.');
                        return;
                    }
                    var lw = msocNum(stage, 'data-logic-w', 400);
                    if (!lw) {
                        alert('Template has no logical width; cannot export.');
                        return;
                    }

                    var prevText = dlBtn.textContent;
                    dlBtn.disabled = true;
                    dlBtn.textContent = 'Rendering…';

                    msocCompositeExport(stage)
                        .then(function (canvas) {
                            return new Promise(function (resolve, reject) {
                                canvas.toBlob(function (blob) {
                                    if (!blob) {
                                        reject(new Error('Empty PNG'));
                                        return;
                                    }
                                    var fn = cardId + '-' + ew + 'x' + eh + '.png';
                                    if (typeof MaverickSaveBlob !== 'undefined' && MaverickSaveBlob.save) {
                                        MaverickSaveBlob.save(blob, fn).then(resolve).catch(reject);
                                        return;
                                    }
                                    var a = document.createElement('a');
                                    var href = URL.createObjectURL(blob);
                                    a.href = href;
                                    a.download = fn;
                                    document.body.appendChild(a);
                                    a.click();
                                    a.remove();
                                    URL.revokeObjectURL(href);
                                    resolve();
                                }, 'image/png');
                            });
                        })
                        .catch(function (err) {
                            console.error(err);
                            alert('Export failed. Try another image or browser.');
                        })
                        .finally(function () {
                            dlBtn.disabled = false;
                            dlBtn.textContent = prevText;
                        });
                });
            });
        })();
    </script>
</body>
</html>
